<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión · Trail El Guerrero 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #08091a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .icon {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      opacity: 0.9;
    }

    .title {
      font-size: 1.125rem;
      font-weight: 600;
      color: #22d3ee;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #f1f5f9;
    }

    p {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 2rem;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 280px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { opacity: 0.7; }

    .btn-primary {
      background: #22d3ee;
      color: #08091a;
    }

    .btn-secondary {
      background: transparent;
      color: #22d3ee;
      border: 1.5px solid #22d3ee;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #22d3ee33;
      border-radius: 1px;
      margin: 2rem auto;
    }

    .note {
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
</head>
<body>

  <div class="icon">📡</div>
  <div class="title">Trail El Guerrero 2026</div>
  <h1>Sin conexión a internet</h1>
  <p>Esta página no está disponible offline. Comprueba tu conexión e inténtalo de nuevo.</p>

  <div class="actions">
    <button class="btn btn-primary" onclick="location.reload()">
      ↻ Reintentar
    </button>
    <a class="btn btn-secondary" href="/voluntarios/mi-ficha">
      Mi ficha de voluntario
    </a>
  </div>

  <div class="divider"></div>
  <p class="note">Tu ficha de voluntario está disponible sin conexión.</p>

</body>
</html>
