<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Trail El Guerrero 2026 — Panel de Gestión</title>
    <meta name="description" content="Panel de gestión integral del Trail El Guerrero 2026. Presupuesto, voluntarios, logística, patrocinadores y proyecto." />
    <meta name="theme-color" content="#22d3ee" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- DNS prefetch para dominios de terceros usados en producción -->
    <!-- Tile servers OSM — el mapa Leaflet los consulta en cuanto se abre el módulo -->
    <link rel="dns-prefetch" href="https://tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://server.arcgisonline.com" />
    <!-- Sentry ingest — solo activo en producción (VITE_SENTRY_DSN) -->
    <link rel="dns-prefetch" href="https://o0.ingest.sentry.io" />

    <meta property="og:title" content="Trail El Guerrero 2026" />
    <meta property="og:description" content="Panel de gestión integral del Trail El Guerrero 2026" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.webp" />
    <meta property="og:url" content="https://appcarrera.vercel.app" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Trail El Guerrero 2026" />
    <meta name="twitter:description" content="Panel de gestión integral del Trail El Guerrero 2026" />
    <meta name="twitter:image" content="/logo.webp" />

    <!-- Leaflet CSS — cargado desde bundle (no CDN) para funcionar offline y sin restricciones de red -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
